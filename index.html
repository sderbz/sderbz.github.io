<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>sdz</title>
<style>
body {
    background: white;
    color: #6bbcff;
    font-family: Helvetica, Arial, sans-serif;
    font-weight: bold;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    padding: 80px 20px 20px 20px;
    box-sizing: border-box;
}
a, .link {
    color: #6bbcff;
    text-decoration: none;
    cursor: pointer;
}
a:hover, .link:hover {
    text-decoration: underline;
}
section {
    display: none;
}
section.active {
    display: block;
}
.back {
    display: inline-block;
    margin-bottom: 20px;
    color: #999;
}
</style>
</head>
<body>

<section id="main" class="active">
    <h1>sdz</h1>
    <p>17 y.o Cgi environment artist</p>
    <br>
    <h2>Projects</h2>
    <p><a href="#">Hallways Of Despair</a></p>
    <p><span class="link" onclick="go('addons')">My addons</span></p>
    <p><span class="link" onclick="go('gallery')">Gallery</span></p>
    <p><span class="link" onclick="go('footages')">My digicams example footages</span></p>
    <p><span class="link" onclick="go('noise')">My noise overlays</span></p>
</section>

<section id="addons">
    <span class="link back" onclick="go('main')">← back</span>
    <h2>My addons</h2>
    <p><a href="https://github.com" target="_blank">Camera_Dolboebify</a></p>
    <!-- Добавляй новые аддоны сюда -->
</section>

<section id="gallery">
    <span class="link back" onclick="go('main')">← back</span>
    <h2>Gallery</h2>
</section>

<section id="footages">
    <span class="link back" onclick="go('main')">← back</span>
    <h2>My digicams example footages</h2>
</section>

<section id="noise">
    <span class="link back" onclick="go('main')">← back</span>
    <h2>My noise overlays</h2>
</section>

<script>
function go(id) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
}
</script>

</body>
</html>
